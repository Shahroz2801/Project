{% extends "base.html" %}
{% block title %}All Products — TechZone{% endblock %}

{% block content %}
<div class="page-header">
  <h1>All <span>Products</span></h1>
  <p>Browse our full collection of premium computer accessories</p>
</div>

<section class="section">
  <div class="section-inner">
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All Products</button>
      <button class="filter-tab" data-filter="keyboards">⌨️ Keyboards</button>
      <button class="filter-tab" data-filter="mice">🖱️ Mice</button>
      <button class="filter-tab" data-filter="monitors">🖥️ Monitors</button>
      <button class="filter-tab" data-filter="headsets">🎧 Headsets</button>
      <button class="filter-tab" data-filter="accessories">🔌 Accessories</button>
    </div>
    <div class="products-grid" id="products-grid"></div>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/products.js') }}"></script>
{% endblock %}
